name: Testing Legacy JDK

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  test-lts:
    name: Build (JDK ${{ matrix.java-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: [17, 21]

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java-version }} (test runtime)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}

      # Kotlin plugin code targets JVM 17; JDK 17 is needed as the Kotlin compilation toolchain.
      - name: Set up JDK 17 (Kotlin compilation toolchain)
        if: matrix.java-version != 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      # Last declaration becomes default and therefore the Gradle runtime JDK.
      - name: Set up JDK 25 (Gradle runtime + Java toolchain/tests)
        if: matrix.java-version != 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Check
        run: ./gradlew check -PjavaConventions.runtimeJdkVersion=${{ matrix.java-version }}

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: legacy-build-artifacts-jdk-${{ matrix.java-version }}
          path: |
            build/test-results/**
            build/reports/**
